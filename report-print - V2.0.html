<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检验科报告打印系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 48px;
            width: 100%;
            max-width: 900px;
            text-align: center;
            position: relative;
        }

        .header {
            margin-bottom: 48px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .header h1 {
            color: #0f172a;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .header p {
            color: #475569;
            font-size: 16px;
            line-height: 1.6;
        }

        .home-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 24px;
            padding: 8px;
        }

        .action-btn {
            width: 100%;
            height: 200px;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 200ms ease-out;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 200ms ease-out;
        }

        .action-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .action-btn:hover::before {
            opacity: 1;
        }

        .action-btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        .action-btn:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 4px;
        }

        .action-btn .icon-wrapper {
            width: 72px;
            height: 72px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .action-btn .icon {
            width: 40px;
            height: 40px;
        }

        .action-btn .text {
            font-size: 16px;
            font-weight: 600;
            color: white;
            letter-spacing: 0.025em;
        }

        .btn-face {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }

        .btn-card {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        }

        .btn-qr {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
        }

        .face-page {
            display: none;
        }

        .face-page.active {
            display: block;
        }

        .home-page {
            display: block;
        }

        .home-page.hidden {
            display: none;
        }

        .camera-box {
            width: 100%;
            max-width: 480px;
            height: 320px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            border-radius: 16px;
            margin: 32px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .camera-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-box .placeholder {
            color: #94a3b8;
            text-align: center;
            z-index: 10;
        }

        .camera-box .placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .face-scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, #10b981 50%, transparent 100%);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
            animation: scan 2s linear infinite;
            z-index: 20;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .face-frame {
            position: absolute;
            width: 220px;
            height: 280px;
            border: 3px solid rgba(16, 185, 129, 0.6);
            border-radius: 12px;
            z-index: 15;
        }

        .face-frame::before,
        .face-frame::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            border: 4px solid #10b981;
        }

        .face-frame::before {
            top: -4px;
            left: -4px;
            border-right: none;
            border-bottom: none;
            border-radius: 12px 0 0 0;
        }

        .face-frame::after {
            bottom: -4px;
            right: -4px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 12px 0;
        }

        .status-text {
            font-size: 16px;
            color: #334155;
            margin: 24px 0;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status-text.success {
            color: #059669;
        }

        .status-text.processing {
            color: #d97706;
        }

        .status-text .status-icon {
            width: 20px;
            height: 20px;
        }

        .nav-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 8px;
            transition: all 200ms ease-out;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 48px;
            min-width: 48px;
        }

        .nav-btn:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .report-section {
            display: none;
            margin-top: 32px;
            padding: 32px;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        .report-section.active {
            display: block;
            animation: fadeInUp 300ms ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .report-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
        }

        .report-header svg {
            width: 28px;
            height: 28px;
            color: #3b82f6;
        }

        .report-header h3 {
            color: #0f172a;
            font-size: 20px;
            font-weight: 700;
        }

        .report-info {
            text-align: left;
            margin-bottom: 24px;
        }

        .report-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .report-info-item {
            padding: 16px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .report-info-item-label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .report-info-item-value {
            font-size: 16px;
            color: #0f172a;
            font-weight: 600;
        }

        .report-info-item-value.status-success {
            color: #059669;
        }

        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f4f6;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 800ms linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.9);
            color: #475569;
            border: 1px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 150ms ease-out;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
        }

        .back-btn:hover {
            background: white;
            color: #334155;
            border-color: #cbd5e1;
            transform: translateX(-2px);
        }

        .back-btn:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header-content {
                flex-direction: column;
                gap: 12px;
            }

            .home-buttons {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .action-btn {
                height: 160px;
            }

            .camera-box {
                height: 260px;
            }

            .face-frame {
                width: 180px;
                height: 230px;
            }

            .back-btn {
                position: relative;
                top: auto;
                left: auto;
                margin-bottom: 24px;
                width: 100%;
                justify-content: center;
            }

            .report-info-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <div class="home-page" id="homePage">
            <div class="header">
                <div class="header-content">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z" fill="#3b82f6"/>
                        <path d="M12 8V16M8 12H16" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <h1>检验科报告打印系统</h1>
                </div>
                <p>请选择验证方式获取您的检验报告</p>
            </div>

            <div class="home-buttons" role="group" aria-label="验证方式选择">
                <button class="action-btn btn-face" onclick="goToFacePage()" aria-label="人脸识别验证">
                    <div class="icon-wrapper">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M15 10C15 11.6569 13.6569 13 12 13C10.3431 13 9 11.6569 9 10C9 8.34315 10.3431 7 12 7C13.6569 7 15 8.34315 15 10Z" fill="white"/>
                            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="white" stroke-width="2" stroke-linecap="round"/>
                            <path d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3Z" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="text">人脸识别</div>
                </button>
                <button class="action-btn btn-card" onclick="alert('医保卡功能开发中...')" aria-label="医保卡验证">
                    <div class="icon-wrapper">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M20 4H4C2.89543 4 2 4.89543 2 6V18C2 19.1046 2.89543 20 4 20H20C21.1046 20 22 19.1046 22 18V6C22 4.89543 21.1046 4 20 4Z" fill="white"/>
                            <path d="M7 8H17M7 12H13" stroke="#0891b2" stroke-width="2" stroke-linecap="round"/>
                            <path d="M7 16H17" stroke="#0891b2" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="text">刷医保卡</div>
                </button>
                <button class="action-btn btn-qr" onclick="alert('二维码功能开发中...')" aria-label="二维码验证">
                    <div class="icon-wrapper">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M3 3H9V9H3V3Z" fill="white"/>
                            <path d="M15 3H21V9H15V3Z" fill="white"/>
                            <path d="M3 15H9V21H3V15Z" fill="white"/>
                            <path d="M11 11H13V13H11V11Z" fill="white"/>
                            <path d="M15 11H21V13H15V11Z" fill="white"/>
                            <path d="M11 15H13V21H11V15Z" fill="white"/>
                            <path d="M15 15H17V17H15V15Z" fill="white"/>
                            <path d="M19 15H21V21H19V15Z" fill="white"/>
                        </svg>
                    </div>
                    <div class="text">刷二维码</div>
                </button>
            </div>
        </div>

        <div class="face-page" id="facePage">
            <button class="back-btn" onclick="goBack()" aria-label="返回首页">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                返回首页
            </button>
            
            <div class="header">
                <div class="header-content">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M15 10C15 11.6569 13.6569 13 12 13C10.3431 13 9 11.6569 9 10C9 8.34315 10.3431 7 12 7C13.6569 7 15 8.34315 15 10Z" fill="#3b82f6"/>
                        <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                        <path d="M12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3Z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <h1>人脸识别验证</h1>
                </div>
                <p>请正对摄像头进行人脸验证</p>
            </div>

            <div class="camera-box" id="cameraBox" role="region" aria-label="摄像头区域">
                <div class="placeholder">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M15.5 11C15.5 12.933 13.933 14.5 12 14.5C10.067 14.5 8.5 12.933 8.5 11C8.5 9.067 10.067 7.5 12 7.5C13.933 7.5 15.5 9.067 15.5 11Z" fill="currentColor"/>
                        <path d="M12 5C8.13401 5 5 8.13401 5 12C5 15.866 8.13401 19 12 19C15.866 19 19 15.866 19 12C19 8.13401 15.866 5 12 5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <div style="font-size: 14px; font-weight: 500;">摄像头区域</div>
                    <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">(模拟演示)</div>
                </div>
                <div class="face-frame"></div>
                <div class="face-scan-line"></div>
            </div>

            <div class="status-text" id="statusText" role="status" aria-live="polite">
                <svg class="status-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" fill="currentColor" opacity="0.2"/>
                    <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                准备识别...
            </div>

            <div id="actionButtons">
                <button class="nav-btn btn-primary" onclick="startFaceRecognition()">
                    开始识别
                </button>
            </div>

            <div class="report-section" id="reportSection" aria-labelledby="report-title">
                <div class="report-header">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z" fill="currentColor" opacity="0.2"/>
                        <path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <h3 id="report-title">检验报告信息</h3>
                </div>
                <div class="report-info">
                    <div class="report-info-grid">
                        <div class="report-info-item">
                            <div class="report-info-item-label">姓名</div>
                            <div class="report-info-item-value">张三</div>
                        </div>
                        <div class="report-info-item">
                            <div class="report-info-item-label">病历号</div>
                            <div class="report-info-item-value">2024010001</div>
                        </div>
                        <div class="report-info-item">
                            <div class="report-info-item-label">检验项目</div>
                            <div class="report-info-item-value">血常规、肝功能、肾功能</div>
                        </div>
                        <div class="report-info-item">
                            <div class="report-info-item-label">检验日期</div>
                            <div class="report-info-item-value">2024-01-15</div>
                        </div>
                        <div class="report-info-item" style="grid-column: 1 / -1;">
                            <div class="report-info-item-label">报告状态</div>
                            <div class="report-info-item-value status-success">✓ 已完成</div>
                        </div>
                    </div>
                </div>
                <button class="nav-btn btn-primary" onclick="printReport()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M6 9V2H18V9" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 18H4C2.89543 18 2 17.1046 2 16V10C2 8.89543 2.89543 8 4 8H20C21.1046 8 22 8.89543 22 10V16C22 17.1046 21.1046 18 20 18H18" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <path d="M18 14H6V22H18V14Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                    </svg>
                    打印报告
                </button>
            </div>
        </div>
    </div>

    <script>
        function goToFacePage() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('facePage').classList.add('active');
            resetFacePage();
        }

        function goBack() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('facePage').classList.remove('active');
            resetFacePage();
        }

        function resetFacePage() {
            const statusText = document.getElementById('statusText');
            statusText.innerHTML = `
                <svg class="status-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" fill="currentColor" opacity="0.2"/>
                    <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                准备识别...
            `;
            statusText.className = 'status-text';
            document.getElementById('reportSection').classList.remove('active');
            document.getElementById('actionButtons').style.display = 'block';
        }

        function startFaceRecognition() {
            const statusText = document.getElementById('statusText');
            const actionButtons = document.getElementById('actionButtons');

            statusText.innerHTML = '<span class="loading" aria-hidden="true"></span> 正在识别中...';
            statusText.className = 'status-text processing';
            actionButtons.style.display = 'none';

            setTimeout(() => {
                statusText.innerHTML = `
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
