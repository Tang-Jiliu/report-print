<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检验科报告打印系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        /* 首页按钮样式 */
        .home-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .action-btn {
            width: 200px;
            height: 200px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .action-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .action-btn .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .action-btn .text {
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        .btn-face {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-qr {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        /* 人脸识别页面 */
        .face-page {
            display: none;
        }

        .face-page.active {
            display: block;
        }

        .home-page {
            display: block;
        }

        .home-page.hidden {
            display: none;
        }

        .camera-box {
            width: 400px;
            height: 300px;
            background: #000;
            border-radius: 15px;
            margin: 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .camera-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-box .placeholder {
            color: white;
            font-size: 16px;
        }

        .face-scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: #00ff00;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .face-frame {
            position: absolute;
            width: 200px;
            height: 250px;
            border: 3px solid #00ff00;
            border-radius: 10px;
        }

        .status-text {
            font-size: 18px;
            color: #333;
            margin: 20px 0;
            font-weight: bold;
        }

        .status-text.success {
            color: #28a745;
        }

        .status-text.processing {
            color: #ffc107;
        }

        /* 按钮通用样式 */
        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        /* 报告打印区域 */
        .report-section {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .report-section.active {
            display: block;
        }

        .report-info {
            text-align: left;
            margin-bottom: 20px;
        }

        .report-info p {
            margin: 10px 0;
            color: #333;
        }

        .report-info strong {
            color: #667eea;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div class="home-page" id="homePage">
            <div class="header">
                <h1>🏥 检验科报告打印系统</h1>
                <p>请选择验证方式获取您的检验报告</p>
            </div>

            <div class="home-buttons">
                <button class="action-btn btn-face" onclick="goToFacePage()">
                    <div class="icon">📷</div>
                    <div class="text">人脸识别</div>
                </button>
                <button class="action-btn btn-card" onclick="alert('医保卡功能开发中...')">
                    <div class="icon">💳</div>
                    <div class="text">刷医保卡</div>
                </button>
                <button class="action-btn btn-qr" onclick="alert('二维码功能开发中...')">
                    <div class="icon">📱</div>
                    <div class="text">刷二维码</div>
                </button>
            </div>
        </div>

        <!-- 人脸识别页面 -->
        <div class="face-page" id="facePage">
            <button class="back-btn" onclick="goBack()">← 返回首页</button>
            
            <div class="header">
                <h1>📷 人脸识别验证</h1>
                <p>请正对摄像头进行人脸验证</p>
            </div>

            <div class="camera-box" id="cameraBox">
                <div class="placeholder">
                    <div>📷 摄像头区域</div>
                    <div style="font-size: 12px; margin-top: 10px;">(模拟演示)</div>
                </div>
                <div class="face-frame"></div>
                <div class="face-scan-line"></div>
            </div>

            <div class="status-text" id="statusText">准备识别...</div>

            <div id="actionButtons">
                <button class="nav-btn btn-primary" onclick="startFaceRecognition()">
                    开始识别
                </button>
            </div>

            <!-- 报告打印区域 -->
            <div class="report-section" id="reportSection">
                <h3 style="margin-bottom: 15px; color: #333;">📋 检验报告信息</h3>
                <div class="report-info">
                    <p><strong>姓名：</strong>张三</p>
                    <p><strong>病历号：</strong>2024010001</p>
                    <p><strong>检验项目：</strong>血常规、肝功能、肾功能</p>
                    <p><strong>检验日期：</strong>2024-01-15</p>
                    <p><strong>报告状态：</strong><span style="color: #28a745;">已完成</span></p>
                </div>
                <button class="nav-btn btn-primary" onclick="printReport()">
                    🖨️ 打印报告
                </button>
            </div>
        </div>
    </div>

    <script>
        // 页面切换
        function goToFacePage() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('facePage').classList.add('active');
            resetFacePage();
        }

        function goBack() {
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('facePage').classList.remove('active');
            resetFacePage();
        }

        // 重置人脸识别页面
        function resetFacePage() {
            document.getElementById('statusText').textContent = '准备识别...';
            document.getElementById('statusText').className = 'status-text';
            document.getElementById('reportSection').classList.remove('active');
            document.getElementById('actionButtons').style.display = 'block';
        }

        // 开始人脸识别（模拟）
        function startFaceRecognition() {
            const statusText = document.getElementById('statusText');
            const actionButtons = document.getElementById('actionButtons');

            // 显示识别中状态
            statusText.innerHTML = '<span class="loading"></span> 正在识别中...';
            statusText.className = 'status-text processing';
            actionButtons.style.display = 'none';

            // 模拟识别过程
            setTimeout(() => {
                statusText.textContent = '✓ 识别成功！正在获取报告...';
                statusText.className = 'status-text success';

                setTimeout(() => {
                    statusText.textContent = '✓ 验证通过，报告已就绪';
                    document.getElementById('reportSection').classList.add('active');
                }, 1000);
            }, 2000);
        }

        // 打印报告
        function printReport() {
            // 创建打印内容
            const printContent = `
                <html>
                <head>
                    <title>检验报告</title>
                    <style>
                        body { font-family: 'Microsoft YaHei'; padding: 40px; }
                        h1 { text-align: center; color: #333; }
                        .info { margin: 20px 0; }
                        .info p { margin: 10px 0; }
                        .footer { margin-top: 40px; text-align: center; color: #666; }
                    </style>
                </head>
                <body>
                    <h1>检验科报告单</h1>
                    <div class="info">
                        <p><strong>姓名：</strong>张三</p>
                        <p><strong>病历号：</strong>2024010001</p>
                        <p><strong>检验项目：</strong>血常规、肝功能、肾功能</p>
                        <p><strong>检验日期：</strong>2024-01-15</p>
                        <p><strong>报告状态：</strong>已完成</p>
                    </div>
                    <div class="footer">
                        <p>打印时间：${new Date().toLocaleString()}</p>
                        <p>检验科 制</p>
                    </div>
                </body>
                </html>
            `;

            // 打开新窗口打印
            const printWindow = window.open('', '_blank');
            printWindow.document.write(printContent);
            printWindow.document.close();
            printWindow.print();

            // 打印完成提示
            setTimeout(() => {
                alert('✓ 报告打印成功！');
            }, 1000);
        }

        // 页面加载提示
        window.onload = function() {
            console.log('检验科报告打印系统已加载');
        };
    </script>
</body>
</html>
